name: Docker

on:
  schedule:
    - cron: '18 22 * * *'
  push:
    branches: [ "main" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: dciancu/unifi-protect-unvr-docker-arm64

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3.5.0
        with:
          cosign-release: 'v2.2.4'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image with custom script
        id: build-and-push
        env:
          BUILD_EDGE: 1
          BUILD_TAG_VERSION: 1
          IMAGE_FULL_TAG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:edge
        run: |
          echo "Building Docker image: $IMAGE_FULL_TAG"
          bash build.sh docker

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "Pushing image: $IMAGE_FULL_TAG"
            docker push "$IMAGE_FULL_TAG"

            # Extract image digest
            DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE_FULL_TAG" | cut -d@ -f2)
            echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          fi

      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          IMAGE_FULL_TAG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:edge
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: |
          echo "Signing image: $IMAGE_FULL_TAG@$DIGEST"
          cosign sign --yes "$IMAGE_FULL_TAG@$DIGEST"
